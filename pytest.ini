[pytest]
testpaths = tests
addopts = -q
markers =
    smoke: fast confidence tests for core functionality
    diagnostic: detailed follow-up tests mainly for failure investigation

# Keep warnings visible in general, but silence noisy upstream MyHDL deprecations.
# Format: action:message:category:module
filterwarnings =
    ignore:Expression\.__init__ missing 1 required positional argument.*:DeprecationWarning:myhdl\.conversion\._misc
    ignore:Bitwise inversion '~' on bool is deprecated.*:DeprecationWarning:myhdl\._intbv
