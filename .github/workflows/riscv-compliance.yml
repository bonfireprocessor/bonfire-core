name: riscv-compliance

on:
  # Run on every push (same as unit-tests)
  push:

  # Run on PRs (requested)
  pull_request:

  # Nightly run (requested)
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC daily

  # Manual trigger (requested)
  workflow_dispatch:

jobs:
  compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout bonfire-core
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/apt/archives
          key: apt-${{ runner.os }}-riscv-${{ hashFiles('.github/workflows/riscv-compliance.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-riscv-

      # - name: Set up Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.13"
      #     cache: 'pip'

      - name: Install RISC-V toolchain (apt)
        run: |
          # Restore cached .deb files if available
          if [ -d ~/.cache/apt/archives ]; then
            sudo cp ~/.cache/apt/archives/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update
          sudo apt-get install -y \
            binutils-riscv64-unknown-elf \
            gcc-riscv64-unknown-elf
          # Copy downloaded .deb files to user cache for next run
          mkdir -p ~/.cache/apt/archives
          sudo cp /var/cache/apt/archives/*.deb ~/.cache/apt/archives/ 2>/dev/null || true

      - name: Setup bonfire-core environment
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          python -m pip install -r requirements.txt

      - name: Clone riscv-compliance (bonfireprocessor fork)
        run: |
          git clone --depth 1 https://github.com/bonfireprocessor/riscv-compliance.git riscv-compliance

      - name: Run riscv-compliance (rv32i + rv32Zicsr)
        env:
          BONFIRE_CORE_ROOT: ${{ github.workspace }}
        run: |
          cd riscv-compliance
          make RISCV_TARGET=bonfire-core RISCV_ISA=rv32i
          make RISCV_TARGET=bonfire-core RISCV_ISA=rv32Zicsr


