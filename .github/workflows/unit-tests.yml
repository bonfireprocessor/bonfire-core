name: unit-tests

on:
  push:
  pull_request:

jobs:
  pytest-unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install RISC-V toolchain (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-riscv64-unknown-elf \
            gcc-riscv64-unknown-elf

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          python -m pip install myhdl==0.11.51 pyelftools pytest

      - name: Run unit + pipeline integration tests (no core integration / no compliance)
        run: |
          pytest -vv \
            tests/test_ut_alu.py \
            tests/test_ut_barrel_shifter.py \
            tests/test_ut_decoder.py \
            tests/test_ut_regfile.py \
            tests/test_ut_loadstore.py \
            tests/test_integration_pipeline.py
