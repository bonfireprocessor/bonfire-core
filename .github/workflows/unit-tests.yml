name: unit-tests

on:
  push:
  pull_request:

jobs:
  pytest-unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install RISC-V toolchain + build deps (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-riscv64-unknown-elf \
            gcc-riscv64-unknown-elf \
            bc \
            bsdextrautils

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          python -m pip install myhdl==0.11.51 pyelftools pytest

      - name: Build core integration test programs (HEX)
        run: |
          # The repo currently installs the riscv64-unknown-elf toolchain, which can
          # still build RV32 code; the Makefile default expects riscv32-unknown-elf.
          make -C code clean all TARGET_PREFIX=riscv64-unknown-elf

      - name: Run unit + integration tests (incl. core integration; no compliance)
        run: |
          pytest -vv \
            tests/test_ut_alu.py \
            tests/test_ut_barrel_shifter.py \
            tests/test_ut_decoder.py \
            tests/test_ut_regfile.py \
            tests/test_ut_loadstore.py \
            tests/test_integration_pipeline.py \
            tests/test_core.py
