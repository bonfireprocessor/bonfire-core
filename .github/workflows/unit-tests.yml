name: unit-tests

on:
  push:
  pull_request:

jobs:
  pytest-unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-riscv-ghdl-${{ hashFiles('.github/workflows/unit-tests.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-riscv-ghdl-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install RISC-V toolchain + build deps (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-riscv64-unknown-elf \
            gcc-riscv64-unknown-elf \
            bc \
            bsdextrautils \
            ghdl

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt

      - name: Build core integration test programs (HEX)
        run: |
          # The repo currently installs the riscv64-unknown-elf toolchain, which can
          # still build RV32 code; the Makefile default expects riscv32-unknown-elf.
          make -C code clean all TARGET_PREFIX=riscv64-unknown-elf

      - name: Run unit + integration tests (incl. core integration; no compliance)
        run: |
          pytest -vv tests/ --ignore=tests/test_compliance_single.py

      - name: Test VHDL core with FuseSoC
        run: |
          fusesoc run --target=sim bonfire-core --testfile=code/build/loop.hex
