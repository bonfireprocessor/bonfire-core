name: fpga artifacts

on:
  workflow_dispatch:

jobs:
  build-icepizero-bitstreams:
    name: build icepizero bitstreams
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/apt/archives
          key: apt-${{ runner.os }}-fpga-artifacts-${{ hashFiles('.github/workflows/fpga-artifacts.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-fpga-artifacts-
            apt-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install apt dependencies
        run: |
          if [ -d ~/.cache/apt/archives ]; then
            sudo cp ~/.cache/apt/archives/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update
          sudo apt-get install -y \
            binutils-riscv64-unknown-elf \
            gcc-riscv64-unknown-elf \
            bc \
            bsdextrautils \
            ghdl \
            openocd
          mkdir -p ~/.cache/apt/archives
          sudo cp /var/cache/apt/archives/*.deb ~/.cache/apt/archives/ 2>/dev/null || true

      - name: Setup bonfire-core Python environment
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          python -m pip install -r requirements.txt

      - name: Download latest OSS CAD Suite nightly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/YosysHQ/oss-cad-suite-build/releases/latest"
          release_json=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$api_url")
          asset_name=$(printf '%s' "$release_json" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(a["name"] for a in data["assets"] if a["name"].startswith("oss-cad-suite-linux-x64-") and a["name"].endswith(".tgz")))')
          asset_url=$(printf '%s' "$release_json" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(a["browser_download_url"] for a in data["assets"] if a["name"].startswith("oss-cad-suite-linux-x64-") and a["name"].endswith(".tgz")))')
          mkdir -p .tools
          curl -fsSL "$asset_url" -o .tools/oss-cad-suite.tgz
          rm -rf .tools/oss-cad-suite
          mkdir -p .tools/oss-cad-suite
          tar -xzf .tools/oss-cad-suite.tgz -C .tools/oss-cad-suite --strip-components=1
          echo "OSS_CAD_SUITE_ENV=$GITHUB_WORKSPACE/.tools/oss-cad-suite/environment" >> "$GITHUB_ENV"
          echo "OSS_CAD_SUITE_ASSET_NAME=$asset_name" >> "$GITHUB_ENV"
          echo "OSS_CAD_SUITE_ASSET_URL=$asset_url" >> "$GITHUB_ENV"

      - name: Build core integration test programs (HEX)
        run: |
          make -C code clean all TARGET_PREFIX=riscv64-unknown-elf

      - name: Build FPGA targets
        run: |
          set -euo pipefail
          . .venv/bin/activate
          . "$OSS_CAD_SUITE_ENV"
          export PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"
          hash -r
          command -v python3
          command -v yosys
          command -v nextpnr-ecp5
          command -v fusesoc

          fusesoc run --target=icepizero ::bonfire-core-soc:0
          fusesoc run --target=icepizero_jtagg ::bonfire-core-soc:0
          fusesoc run --target=icepizero_extended --flag=fw_monitor ::bonfire-core-soc:0

      - name: Write build facts
        run: |
          set -euo pipefail
          . .venv/bin/activate
          . "$OSS_CAD_SUITE_ENV"
          export PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"
          hash -r

          export YOSYS_VERSION="$(yosys --version 2>&1 | head -n 1)"
          export NEXTPNR_VERSION="$(nextpnr-ecp5 --version 2>&1 | head -n 1)"
          export GHDL_VERSION="$(ghdl --version 2>&1 | head -n 1)"

          python3 - <<'PY'
          import os
          from pathlib import Path

          content = "\n".join([
              "# Build facts",
              "",
              f"- OSS CAD Suite nightly asset: `{os.environ['OSS_CAD_SUITE_ASSET_NAME']}`",
              f"- OSS CAD Suite nightly URL: <{os.environ['OSS_CAD_SUITE_ASSET_URL']}>",
              f"- yosys: `{os.environ['YOSYS_VERSION']}`",
              f"- nextpnr-ecp5: `{os.environ['NEXTPNR_VERSION']}`",
              f"- ghdl: `{os.environ['GHDL_VERSION']}`",
              "",
          ])

          for rel_dir in [
              "build/bonfire-core-soc_0/icepizero-trellis",
              "build/bonfire-core-soc_0/icepizero_jtagg-trellis",
              "build/bonfire-core-soc_0/icepizero_extended-trellis",
          ]:
              Path(rel_dir, "build-facts.md").write_text(content)
          PY

      - name: Upload icepizero artifacts
        uses: actions/upload-artifact@v4
        with:
          name: icepizero-artifacts
          path: |
            build/bonfire-core-soc_0/icepizero-trellis/bonfire-core-soc_0.bit
            build/bonfire-core-soc_0/icepizero-trellis/next.log
            build/bonfire-core-soc_0/icepizero-trellis/yosys.log
            build/bonfire-core-soc_0/icepizero-trellis/build-facts.md
          if-no-files-found: error

      - name: Upload icepizero_jtagg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: icepizero_jtagg-artifacts
          path: |
            build/bonfire-core-soc_0/icepizero_jtagg-trellis/bonfire-core-soc_0.bit
            build/bonfire-core-soc_0/icepizero_jtagg-trellis/next.log
            build/bonfire-core-soc_0/icepizero_jtagg-trellis/yosys.log
            build/bonfire-core-soc_0/icepizero_jtagg-trellis/build-facts.md
          if-no-files-found: error

      - name: Upload icepizero_extended artifacts
        uses: actions/upload-artifact@v4
        with:
          name: icepizero_extended-artifacts
          path: |
            build/bonfire-core-soc_0/icepizero_extended-trellis/bonfire-core-soc_0.bit
            build/bonfire-core-soc_0/icepizero_extended-trellis/next.log
            build/bonfire-core-soc_0/icepizero_extended-trellis/yosys.log
            build/bonfire-core-soc_0/icepizero_extended-trellis/build-facts.md
          if-no-files-found: error
